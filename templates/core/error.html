{% extends "base.html" %}

{% block title %}Error - Lurnexa{% endblock %}
{% block body_class %}standalone-page{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg p-5 text-center" style="border-radius: 20px;">
                <div class="mb-4">
                    <i class="fa-solid fa-circle-xmark text-danger" style="font-size: 5rem;"></i>
                </div>
                <h2 class="fw-bold mb-3">Something Went Wrong</h2>
                <p class="text-muted mb-4">{{ message }}</p>
                <a href="{% url 'login' %}" class="btn btn-outline-secondary btn-lg rounded-pill px-5 shadow-sm">Back to Home</a>
            </div>
        </div>
    </div>
</div>


{% endblock %}
