{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}Login - Lurnexa{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Access the Lurnexa HRMS platform. Enter your credentials to log in or request a password reset.{% endblock %}">
    <meta name="robots" content="index, nofollow">
    <link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
    <link rel="icon" type="image/png" href="{% static 'img/namelesslogolurnexa.png' %}?v=2">
    <!-- Web App Manifest & iOS App Meta -->
    <link rel="manifest" href="{% url 'manifest_json' %}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Lurnexa">
    <link rel="apple-touch-icon" href="{% static 'img/namelesslogolurnexa.png' %}?v=2">

    <!-- Google Fonts: Inter -->
    <link href="{% static 'vendor/google-fonts/inter.css' %}" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">
    <!-- Lurnexa Custom Styles -->
    <link href="{% static 'css/lurnexastyles.css' %}?v=1.3" rel="stylesheet">

    <!-- Security: Prevent caching for login page to ensure session termination logic always runs -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
</head>
<body>
    <div class="auth-wrapper">
        <div class="container d-flex justify-content-center">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="brand-logo">
                        <img src="{% static 'img/namelesslogolurnexa.png' %}?v=2" alt="Lurnexa" style="height: 40px; width: auto;">
                    </div>
                    <h3>Lurnexa</h3>
                    <p>{% block subtitle %}Enter your credentials to access your account{% endblock %}</p>
                </div>
                <div class="auth-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    
    <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('{% url "service_worker_js" %}')
                    .then(function(registration) {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    }, function(err) {
                        console.error('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
