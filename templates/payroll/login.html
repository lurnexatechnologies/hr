{% extends 'base.html' %}
{% load static %}
{% block nav_manage_payroll %}active{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="card shadow-lg border-0 payroll-card-hover" style="max-width: 450px; width: 100%; border-radius: 15px; overflow: hidden;">
            <div class="card-header payroll-card-header text-white p-4 text-center border-0">
                <div class="mb-3">
                    <i class="fas fa-lock-open fa-3x mb-3 text-warning"></i>
                </div>
                <h3 class="fw-bold mb-0">Payroll Vault Access</h3>
                <p class="text-white-50 small mt-2">Restricted Area: Additional Verification Required</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Payroll Manager ID</label>
                        <div class="input-group payroll-login-input">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-user-shield text-muted"></i></span>
                            <input type="text" name="payroll_id" class="form-control bg-light border-start-0 py-2" placeholder="Enter Payroll ID" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Access PIN / Password</label>
                        <div class="input-group payroll-login-input">
                            <span class="input-group-text bg-light border-end-0"><i class="fas fa-key text-muted"></i></span>
                            <input type="password" name="payroll_password" id="payrollPassword" class="form-control bg-light border-start-0 py-2" placeholder="••••••••" required>
                            <button class="btn btn-light border" type="button" onclick="togglePayrollPassword()" style="border-radius: 0 8px 8px 0;">
                                <i class="fas fa-eye text-muted" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <script>
                        function togglePayrollPassword() {
                            const passwordInput = document.getElementById('payrollPassword');
                            const eyeIcon = document.getElementById('eyeIcon');
                            if (passwordInput.type === 'password') {
                                passwordInput.type = 'text';
                                eyeIcon.classList.remove('fa-eye');
                                eyeIcon.classList.add('fa-eye-slash');
                            } else {
                                passwordInput.type = 'password';
                                eyeIcon.classList.remove('fa-eye-slash');
                                eyeIcon.classList.add('fa-eye');
                            }
                        }
                    </script>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-payroll-dark py-2 fw-bold">
                            <i class="fas fa-unlock me-2 text-warning"></i> Unlock Payroll
                        </button>
                        <a href="{% url 'hr_dashboard' %}" class="btn btn-link text-muted text-decoration-none">
                            <i class="fas fa-arrow-left me-1"></i> Return to Dashboard
                        </a>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light p-3 text-center border-0">
                <small class="text-muted"><i class="fas fa-info-circle me-1"></i> For security, this access expires when your session ends.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
