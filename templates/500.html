{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Lurnexa</title>
    <link rel="icon" type="image/png" href="{% static 'img/namelesslogolurnexa.png' %}?v=2">
    <!-- Google Fonts: Inter -->
    <link href="{% static 'vendor/google-fonts/inter.css' %}" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Lurnexa Custom Styles -->
    <link href="{% static 'css/lurnexastyles.css' %}?v=1.3" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f3ff 0%, #e0e7ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #1e1b4b;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 3rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.08);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1.5rem;
        }
        .brand-logo img {
            height: 48px;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .btn-home {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: #ffffff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="brand-logo">
            <img src="{% static 'img/namelesslogolurnexa.png' %}?v=2" alt="Lurnexa">
        </div>
        <h1 class="error-code">500</h1>
        <h2 class="fw-bold mb-3 fs-4">System Error</h2>
        <p class="text-muted mb-4">Something went wrong on our end. We have logged the error and our technical team is looking into it.</p>
        <a href="/" class="btn btn-home">
            Go to Homepage
        </a>
    </div>
</body>
</html>
