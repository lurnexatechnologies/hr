{% extends "base_auth.html" %}

{% block title %}Access Denied - 403 Forbidden{% endblock %}

{% block content %}
<div class="text-center py-4">
    <div class="mb-4">
        <i class="fa-solid fa-ban text-danger fa-4x"></i>
    </div>
    <h4 class="text-danger fw-bold mb-3">Access Denied (403)</h4>
    <p class="text-muted mb-4">
        You do not have the required role or permissions to access this page.
    </p>
    <div class="d-grid gap-2">
        <a href="{% url 'index' %}" class="btn btn-primary btn-lg">
            <i class="fa-solid fa-house me-2"></i>Go to Home
        </a>
    </div>
</div>
{% endblock %}
