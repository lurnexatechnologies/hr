{% extends "base_auth.html" %}

{% block content %}
<div class="text-center mb-4">
    <h4 class="fw-bold">Set New Password</h4>
    <p class="text-muted">Please enter and confirm your new password below.</p>
</div>

<form method="POST" action="{% url 'reset_password' token=token %}">
    {% csrf_token %}
    <div class="mb-3">
        <label for="password" class="form-label fw-medium text-muted">New Password</label>
        <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="password" name="password" placeholder="••••••••" required oninput="validatePasswordStrength()">
            <span class="input-group-text bg-white border-start-0 cursor-pointer" onclick="togglePasswordVisibility('password', this)" style="cursor: pointer;">
                <i class="fa-solid fa-eye text-muted"></i>
            </span>
        </div>
        <div id="passwordStrength" class="small mt-1 fw-bold"></div>
    </div>

    <div class="mb-4">
        <label for="confirm_password" class="form-label fw-medium text-muted">Confirm New Password</label>
        <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
            <input type="password" class="form-control border-start-0 border-end-0 ps-0" id="confirm_password" name="confirm_password" placeholder="••••••••" required oninput="validatePasswordMatch()">
            <span class="input-group-text bg-white border-start-0 cursor-pointer" onclick="togglePasswordVisibility('confirm_password', this)" style="cursor: pointer;">
                <i class="fa-solid fa-eye text-muted"></i>
            </span>
        </div>
        <div id="passwordMatch" class="small mt-1 fw-bold"></div>
    </div>

    <script>
        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        function validatePasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$/;
            
            if (!password) {
                strengthDiv.innerHTML = '';
                return;
            }

            if (regex.test(password)) {
                strengthDiv.innerHTML = '<span class="text-success" style="font-size: 0.75rem;"><i class="fa-solid fa-check-circle me-1"></i> Strong Password</span>';
            } else {
                strengthDiv.innerHTML = '<span class="text-danger" style="font-size: 0.75rem;"><i class="fa-solid fa-triangle-exclamation me-1"></i> Need: Uppercase, Lowercase, Number & Symbol (Min 8)</span>';
            }
            validatePasswordMatch();
        }

        function validatePasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const matchDiv = document.getElementById('passwordMatch');
            const confirmInput = document.getElementById('confirm_password');

            if (!confirmPassword) {
                matchDiv.innerHTML = '';
                confirmInput.setCustomValidity('');
                return;
            }

            if (password === confirmPassword) {
                matchDiv.innerHTML = '<span class="text-success" style="font-size: 0.75rem;"><i class="fa-solid fa-check-circle me-1"></i> Passwords Match</span>';
                confirmInput.setCustomValidity('');
            } else {
                matchDiv.innerHTML = '<span class="text-danger" style="font-size: 0.75rem;"><i class="fa-solid fa-circle-xmark me-1"></i> Passwords do not match</span>';
                confirmInput.setCustomValidity('Passwords do not match');
            }
        }
    </script>
    
    <div class="d-grid gap-2 mb-3">
        <button type="submit" class="btn btn-primary btn-lg">Reset Password</button>
    </div>
</form>
{% endblock %}
